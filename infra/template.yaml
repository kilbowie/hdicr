AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: HDICR Service - Lambda + API Gateway

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        AUTH0_DOMAIN: !Ref Auth0Domain
        AUTH0_AUDIENCE: !Ref Auth0Audience
        AUTH0_CLIENT_ID: !Ref AUTH0ClientId
        AUTH0_CLIENT_SECRET: !Ref AUTH0ClientSecret
        JWT_SIGNING_KEY: !Ref JwtSigningKey
        HDICR_DEFAULT_TENANT_ID: !Ref HDICRDefaultTenantId
        AUTH0_ROLES_CLAIM_NAMESPACE: !Ref Auth0RolesClaimNamespace
        AUTH0_TENANT_ID_CLAIM_NAMESPACE: !Ref Auth0TenantIdClaimNamespace
        DB_POOL_SIZE: !Ref DBPoolSize

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production

  HDICRDatabaseURL:
    Type: String
    NoEcho: true

  Auth0Domain:
    Type: String

  Auth0Audience:
    Type: String
    Default: https://hdicr.trulyimagined.com

  HDICRDefaultTenantId:
    Type: String
    Default: trulyimagined

  Auth0RolesClaimNamespace:
    Type: String
    Default: https://trulyimagined.com/roles

  Auth0TenantIdClaimNamespace:
    Type: String
    Default: https://trulyimagined.com/tenant_id

  DBPoolSize:
    Type: String
    Default: "20"

  S3BucketName:
    Type: String
    Default: trulyimagined-media

  CustomDomainName:
    Type: String
    Default: hdicr.trulyimagined.com

  CertificateArn:
    Type: String

  AUTH0ClientId:
    Type: String
    NoEcho: true

  AUTH0ClientSecret:
    Type: String
    NoEcho: true

  JwtSigningKey:
    Type: String
    NoEcho: true

Resources:
  HDICRApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: hdicr-api
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'https://trulyimagined.com'"

  IdentityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hdicr-identity-${Environment}
      CodeUri: ../services/identity-service/dist
      Handler: index.handler
      Environment:
        Variables:
          DATABASE_URL: !Ref HDICRDatabaseURL
          S3_BUCKET_NAME: !Ref S3BucketName
      Events:
        Proxy:
          Type: Api
          Properties:
            RestApiId: !Ref HDICRApi
            Path: /v1/identity/{proxy+}
            Method: ANY
        VerifyConfirmed:
          Type: Api
          Properties:
            RestApiId: !Ref HDICRApi
            Path: /identity/verify-confirmed
            Method: POST

  ConsentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hdicr-consent-${Environment}
      CodeUri: ../services/consent-service/dist
      Handler: index.handler
      Environment:
        Variables:
          DATABASE_URL: !Ref HDICRDatabaseURL
      Events:
        Proxy:
          Type: Api
          Properties:
            RestApiId: !Ref HDICRApi
            Path: /v1/consent/{proxy+}
            Method: ANY

  LicensingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hdicr-licensing-${Environment}
      CodeUri: ../services/licensing-service/dist
      Handler: index.handler
      Environment:
        Variables:
          DATABASE_URL: !Ref HDICRDatabaseURL
      Events:
        Proxy:
          Type: Api
          Properties:
            RestApiId: !Ref HDICRApi
            Path: /v1/license/{proxy+}
            Method: ANY

  RepresentationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hdicr-representation-${Environment}
      CodeUri: ../services/representation-service/dist
      Handler: index.handler
      Environment:
        Variables:
          DATABASE_URL: !Ref HDICRDatabaseURL
      Events:
        Proxy:
          Type: Api
          Properties:
            RestApiId: !Ref HDICRApi
            Path: /v1/representation/{proxy+}
            Method: ANY

  HDICRCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL

  HDICRBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - HDICRApiprodStage
      - HDICRCustomDomain
    Properties:
      DomainName: !Ref HDICRCustomDomain
      RestApiId: !Ref HDICRApi
      Stage: prod

Outputs:
  ApiEndpoint:
    Value: !Sub https://${HDICRApi}.execute-api.${AWS::Region}.amazonaws.com/prod/
  CustomDomain:
    Value: !Ref CustomDomainName
